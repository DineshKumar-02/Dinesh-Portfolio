<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | DineshKumar S</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    section { padding-top: 6rem; }
    .back-btn { margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--accent); font-weight: 600; font-family: var(--font-display); }
    .back-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Sticky Header Navigation -->
  <header>
    <div class="container nav-container">
      <a href="../index.html" class="logo">DineshKumar<span>.</span></a>
      <nav class="nav-links">
        <a href="../index.html#home" class="nav-link">Home</a>
        <a href="../index.html#about" class="nav-link">About</a>
        <a href="../index.html#skills" class="nav-link">Skills</a>
        <a href="../index.html#projects" class="nav-link">Projects</a>
        <a href="../index.html#certifications" class="nav-link">Certifications</a>
        <a href="../index.html#contact" class="nav-link active">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Contact Section -->
  <section style="border: none;">
    <div class="container">
      <a href="../index.html#contact" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
      
      <h1 class="section-title">Get in Touch</h1>

      <div class="contact-grid">
        <div class="contact-channels">
          
          <a href="mailto:dineshsudhakaran2706@gmail.com" class="contact-card-link">
            <i class="fa-solid fa-envelope"></i>
            <div>
              <h4>Email</h4>
              <p>dineshsudhakaran2706@gmail.com</p>
            </div>
          </a>

          <a href="tel:+917904125112" class="contact-card-link">
            <i class="fa-solid fa-phone"></i>
            <div>
              <h4>Phone</h4>
              <p>+91 79041 25112</p>
            </div>
          </a>

          <a href="https://linkedin.com/in/dinesh45" target="_blank" class="contact-card-link">
            <i class="fa-brands fa-linkedin-in"></i>
            <div>
              <h4>LinkedIn</h4>
              <p>linkedin.com/in/dinesh45</p>
            </div>
          </a>

          <a href="https://github.com/DineshKumar-02" target="_blank" class="contact-card-link">
            <i class="fa-brands fa-github"></i>
            <div>
              <h4>GitHub</h4>
              <p>github.com/DineshKumar-02</p>
            </div>
          </a>

        </div>

        <form class="contact-form" id="contact-form" action="https://formspree.io/f/placeholder" method="POST">
          <div class="form-row">
            <input type="text" name="name" class="form-input" placeholder="Your Name" required>
            <input type="email" name="email" class="form-input" placeholder="Email Address" required>
          </div>
          <input type="text" name="subject" class="form-input" placeholder="Subject" required>
          <textarea name="message" class="form-textarea" placeholder="Your Message..." required></textarea>
          <button type="submit" class="btn-submit">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer style="margin-top: 5rem;">
    <div class="container footer-wrap">
      <div class="footer-copy">&copy; 2026 DineshKumar S. All rights reserved.</div>
    </div>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
